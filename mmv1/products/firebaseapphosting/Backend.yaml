---
name: Backend
description: Description
base_url: projects/{{project}}/locations/{{location}}/backends
update_mask: true
self_link: projects/{{project}}/locations/{{location}}/backends/{{backend_id}}
create_url: projects/{{project}}/locations/{{location}}/backends?backendId={{backend_id}}
update_verb: PATCH
id_format: projects/{{project}}/locations/{{location}}/backends/{{backend_id}}
import_format:
- projects/{{project}}/locations/{{location}}/backends/{{backend_id}}
examples:
- name: name_of_example_file
  primary_resource_id: example
  vars:
    resource_name: test-resource
autogen_async: true
async:
  operation:
    timeouts:
      insert_minutes: 20
      update_minutes: 20
      delete_minutes: 20
    base_url: '{{op_id}}'
  actions:
  - create
  - delete
  - update
  type: OpAsync
  result:
    resource_inside_response: true
  error: {}
  include_project: false
autogen_status: QmFja2VuZA==
parameters:
- name: location
  type: String
  description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
  immutable: true
  url_param_only: true
  required: true
- name: backendId
  type: String
  description: |-
    Required. Id of the backend.  Also used as the service ID for Cloud Run, and as part
    of the default domain name.
  immutable: true
  url_param_only: true
  required: true
properties:
- name: environment
  type: String
  description: |-
    Optional. The environment name of the backend, used to load environment variables
    from environment specific configuration.
- name: appId
  type: String
  description: |-
    Optional. The [ID of a Web
    App](https://firebase.google.com/docs/reference/firebase-management/rest/v1beta1/projects.webApps#WebApp.FIELDS.app_id)
    associated with the backend.
- name: reconciling
  type: Boolean
  description: |-
    Output only. A field that, if true, indicates that the system is working to make
    adjustments to the backend during a LRO.
  output: true
- name: labels
  type: KeyValueLabels
  description: |-
    Optional. Unstructured key value map that can be used to organize and categorize
    objects.
- name: etag
  type: String
  description: |-
    Output only. Server-computed checksum based on other values; may be sent
    on update or delete to ensure operation is done on expected resource.
  output: true
- name: uid
  type: String
  description: Output only. System-assigned, unique identifier.
  output: true
- name: displayName
  type: String
  description: Optional. Human-readable name. 63 character limit.
- name: servingLocality
  type: String
  description: |-
    Required. Immutable. Specifies how App Hosting will serve the content for this backend. It will
    either be contained to a single region (REGIONAL_STRICT) or allowed to use
    App Hosting's global-replicated serving infrastructure (GLOBAL_ACCESS).
    Possible values:
    SERVING_LOCALITY_UNSPECIFIED
    REGIONAL_STRICT
    GLOBAL_ACCESS
  immutable: true
  required: true
- name: uri
  type: String
  description: Output only. The primary URI to communicate with the backend.
  output: true
- name: serviceAccount
  type: String
  description: |-
    Required. The name of the service account used for Cloud Build and Cloud Run.
    Should have the role roles/firebaseapphosting.googleapis.com/computeRunner
    or equivalent permissions.
  required: true
- name: createTime
  type: String
  description: Output only. Time at which the backend was created.
  output: true
- name: updateTime
  type: String
  description: Output only. Time at which the backend was last updated.
  output: true
- name: deleteTime
  type: String
  description: Output only. Time at which the backend was deleted.
  output: true
- name: annotations
  type: KeyValuePairs
  description: |-
    Optional. Unstructured key value map that may be set by external tools to
    store and arbitrary metadata. They are not queryable and should be
    preserved when modifying objects.
- name: name
  type: String
  description: |-
    Identifier. The resource name of the backend.

    Format:

    `projects/{project}/locations/{locationId}/backends/{backendId}`.
  output: true
- name: mode
  type: String
  description: 'Optional. Deprecated: Use `environment` instead.'
- name: codebase
  type: NestedObject
  description: |-
    The connection to an external source repository to watch for event-driven
    updates to the backend.
  properties:
  - name: repository
    type: String
    description: |-
      Required. The resource name for the Developer Connect
      [`gitRepositoryLink`](https://cloud.google.com/developer-connect/docs/api/reference/rest/v1/projects.locations.connections.gitRepositoryLinks)
      connected to this backend, in the format:

      projects/{project}/locations/{location}/connections/{connection}/gitRepositoryLinks/{repositoryLink}

      The connection for the `gitRepositoryLink` must made be using the
      Firebase App Hosting Github App via the Firebase Console.
    required: true
  - name: rootDirectory
    type: String
    description: |-
      Optional. If `repository` is provided, the directory relative to the root of the
      repository to use as the root for the deployed web app.
- name: managedResources
  type: Array
  description: Output only. A list of the resources managed by this backend.
  output: true
  item_type:
    type: NestedObject
    properties:
    - name: runService
      type: NestedObject
      description: |-
        A managed Cloud Run
        [`service`](https://cloud.google.com/run/docs/reference/rest/v2/projects.locations.services#resource:-service).
      properties:
      - name: service
        type: String
        description: |-
          Optional. The name of the Cloud Run
          [`service`](https://cloud.google.com/run/docs/reference/rest/v2/projects.locations.services#resource:-service),
          in the format:

          projects/{project}/locations/{location}/services/{serviceId}
