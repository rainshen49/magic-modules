---
name: Build
description: Description
base_url: projects/{{project}}/locations/{{location}}/backends/{{backend}}/builds
immutable: true
self_link: projects/{{project}}/locations/{{location}}/backends/{{backend}}/builds/{{build_id}}
create_url: projects/{{project}}/locations/{{location}}/backends/{{backend}}/builds?buildId={{build_id}}
id_format: projects/{{project}}/locations/{{location}}/backends/{{backend}}/builds/{{build_id}}
import_format:
- projects/{{project}}/locations/{{location}}/backends/{{backend}}/builds/{{build_id}}
examples:
- name: name_of_example_file
  primary_resource_id: example
  vars:
    resource_name: test-resource
autogen_async: true
async:
  operation:
    timeouts:
      insert_minutes: 20
      update_minutes: 20
      delete_minutes: 20
    base_url: '{{op_id}}'
  actions:
  - create
  - delete
  - update
  type: OpAsync
  result:
    resource_inside_response: true
  error: {}
  include_project: false
autogen_status: QnVpbGQ=
parameters:
- name: location
  type: String
  description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
  immutable: true
  url_param_only: true
  required: true
- name: backend
  type: String
  description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
  immutable: true
  url_param_only: true
  required: true
- name: buildId
  type: String
  description: Required. Desired ID of the build being created.
  immutable: true
  url_param_only: true
  required: true
properties:
- name: annotations
  type: KeyValuePairs
  description: |-
    Optional. Unstructured key value map that may be set by external tools to
    store and arbitrary metadata. They are not queryable and should be
    preserved when modifying objects.
- name: name
  type: String
  description: |-
    Identifier. The resource name of the build.

    Format:

    `projects/{project}/locations/{locationId}/backends/{backendId}/builds/{buildId}`.
  output: true
- name: displayName
  type: String
  description: Optional. Human-readable name. 63 character limit.
- name: source
  type: NestedObject
  description: The source for the build.
  required: true
  properties:
  - name: container
    type: NestedObject
    description: |-
      The URI of an Artifact Registry
      [container
      image](https://cloud.google.com/artifact-registry/docs/reference/rest/v1/projects.locations.repositories.dockerImages)
      to use as the build source.
    properties:
    - name: image
      type: String
      description: Required. A URI representing a container for the backend to use.
      required: true
  - name: codebase
    type: NestedObject
    description: |-
      A codebase source, representing the state of the codebase
      that the build will be created at.
    properties:
    - name: displayName
      type: String
      description: |-
        Output only. The human-friendly name to use for this Codebase when displaying a build.
        We use the first eight characters of the SHA-1 hash for GitHub.com.
      output: true
    - name: hash
      type: String
      description: Output only. The full SHA-1 hash of a Git commit, if available.
      output: true
    - name: commitMessage
      type: String
      description: Output only. The message of a codebase change.
      output: true
    - name: uri
      type: String
      description: |-
        Output only. A URI linking to the codebase on an hosting provider's website. May
        not be valid if the commit has been rebased or force-pushed out of
        existence in the linked repository.
      output: true
    - name: author
      type: NestedObject
      description: |-
        Version control metadata for a user associated with a resolved codebase.
        Currently assumes a Git user.
      properties:
      - name: displayName
        type: String
        description: Output only. The 'name' field in a Git user's git.config. Required by Git.
        output: true
      - name: email
        type: String
        description: Output only. The 'email' field in a Git user's git.config, if available.
        output: true
      - name: imageUri
        type: String
        description: |-
          Output only. The URI of an image file associated with the user's account in an
          external source control provider, if available.
        output: true
    - name: commitTime
      type: String
      description: Output only. The time the change was made.
      output: true
    - name: branch
      type: String
      description: The branch in the codebase to build from, using the latest commit.
    - name: commit
      type: String
      description: The commit in the codebase to build from.
- name: createTime
  type: String
  description: Output only. Time at which the build was created.
  output: true
- name: etag
  type: String
  description: |-
    Output only. Server-computed checksum based on other values; may be sent
    on update or delete to ensure operation is done on expected resource.
  output: true
- name: image
  type: String
  description: |-
    Output only. The Artifact Registry
    [container
    image](https://cloud.google.com/artifact-registry/docs/reference/rest/v1/projects.locations.repositories.dockerImages)
    URI, used by the Cloud Run
    [`revision`](https://cloud.google.com/run/docs/reference/rest/v2/projects.locations.services.revisions)
    for this build.
  output: true
- name: buildLogsUri
  type: String
  description: |-
    Output only. The location of the [Cloud Build
    logs](https://cloud.google.com/build/docs/view-build-results) for the build
    process.
  output: true
- name: reconciling
  type: Boolean
  description: Output only. A field that, if true, indicates that the build has an ongoing LRO.
  output: true
- name: uid
  type: String
  description: Output only. System-assigned, unique identifier.
  output: true
- name: error
  type: NestedObject
  description: |-
    The `Status` type defines a logical error model that is suitable for
    different programming environments, including REST APIs and RPC APIs. It is
    used by [gRPC](https://github.com/grpc). Each `Status` message contains
    three pieces of data: error code, error message, and error details.

    You can find out more about this error model and how to work with it in the
    [API Design Guide](https://cloud.google.com/apis/design/errors).
  properties:
  - name: code
    type: Integer
    description: The status code, which should be an enum value of google.rpc.Code.
  - name: message
    type: String
    description: |-
      A developer-facing error message, which should be in English. Any
      user-facing error message should be localized and sent in the
      google.rpc.Status.details field, or localized by the client.
  - name: details
    type: Array
    description: |-
      A list of messages that carry the error details.  There is a common set of
      message types for APIs to use.
    item_type:
      type: NestedObject
- name: updateTime
  type: String
  description: Output only. Time at which the build was last updated.
  output: true
- name: labels
  type: KeyValueLabels
  description: |-
    Optional. Unstructured key value map that can be used to organize and categorize
    objects.
- name: deleteTime
  type: String
  description: Output only. Time at which the build was deleted.
  output: true
- name: state
  type: String
  description: |-
    Output only. The state of the build.
    Possible values:
    STATE_UNSPECIFIED
    BUILDING
    BUILT
    DEPLOYING
    READY
    FAILED
  output: true
- name: errorSource
  type: String
  description: |-
    Output only. The source of the error for the build, if in a `FAILED` state.
    Possible values:
    ERROR_SOURCE_UNSPECIFIED
    CLOUD_BUILD
    CLOUD_RUN
  output: true
- name: environment
  type: String
  description: Output only. The environment name of the backend when this build was created.
  output: true
- name: config
  type: NestedObject
  description: Additional configuration of the backend for this build.
  properties:
  - name: env
    type: Array
    description: Optional. Environment variables for this build.
    item_type:
      type: NestedObject
      properties:
      - name: value
        type: String
        description: |-
          A plaintext value. This value is encrypted at rest, but all project
          readers can view the value when reading your backend configuration.
      - name: secret
        type: String
        description: |-
          A fully qualified secret version. The value of the secret will be
          accessed once while building the application and once per cold start
          of the container at runtime. The service account used by Cloud Build
          and by Cloud Run must each have the `secretmanager.versions.access`
          permission on the secret.
      - name: variable
        type: String
        description: |-
          Required. The name of the environment variable.

          - Must be a valid environment variable name (e.g. A-Z or underscores).
          - May not start with "FIREBASE" or "GOOGLE".
          - May not be a reserved environment variable for KNative/Cloud Run
        required: true
      - name: availability
        type: Array
        description: |-
          Optional. Where this variable should be made available. If left unspecified, will
          be available in both BUILD and BACKEND.
        item_type:
          type: String
  - name: runConfig
    type: NestedObject
    description: |-
      Additional configuration to apply to the Cloud Run
      [`service`](https://cloud.google.com/run/docs/reference/rest/v2/projects.locations.services#resource:-service).
    properties:
    - name: cpu
      type: Double
      description: |-
        Optional. Number of CPUs used for each serving instance.

        By default, cpu defaults to the Cloud Run's default of 1.0.

        CPU can be set to value 1, 2, 4, 6, or 8 CPUs, and for less than 1 CPU,
        a value from 0.08 to less than 1.00, in increments of 0.01.

        If you set a value of less than 1 CPU, you must set concurrency to 1,
        and CPU will only be allocated during request processing.

        Increasing CPUs limit may require increase in memory limits:

        - 4 CPUs: at least 2 GiB
        - 6 CPUs: at least 4 GiB
        - 8 CPUs: at least 4 GiB
    - name: memoryMib
      type: Integer
      description: |-
        Optional. Amount of memory allocated for each serving instance in MiB.

        By default, memory defaults to the Cloud Run's default where each
        instance is allocated 512 MiB of memory.

        Memory can be set to any integer value between 128 to 32768.

        Increasing memory limit may require increase in CPUs limits:

        - Over 4 GiB: at least 2 CPUs
        - Over 8 GiB: at least 4 CPUs
        - Over 16 GiB: at least 6 CPUs
        - Over 24 GiB: at least 8 CPUs
    - name: concurrency
      type: Integer
      description: |-
        Optional. Maximum number of requests that each Cloud Run instance can receive.

        By default, each instance can receive Cloud Run's default of up to
        80 requests at the same time.

        Concurrency can be set to any integer value up to 1000.
    - name: maxInstances
      type: Integer
      description: |-
        Optional. Number of Cloud Run instances to maintain at maximum for each revision.

        By default, each Cloud Run
        [`service`](https://cloud.google.com/run/docs/reference/rest/v2/projects.locations.services#resource:-service)
        scales out to Cloud Run's default of a maximum of 100 instances. The
        maximum max_instances limit is based on your quota. See
        https://cloud.google.com/run/docs/configuring/max-instances#limits.
    - name: minInstances
      type: Integer
      description: |-
        Optional. Number of Cloud Run instances to maintain at minimum for each Cloud Run
        Service.

        By default, there are no minimum.

        Even if the service splits traffic across multiple revisions,
        the total number of instances for a service will be capped
        at this value.
